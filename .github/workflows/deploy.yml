name: Deploy to WeChat Cloud

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install and Deploy
      env:
        TCB_SECRETID: ${{ secrets.TCB_SECRETID }}
        TCB_SECRETKEY: ${{ secrets.TCB_SECRETKEY }}
        TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
      run: |
        npm install -g @cloudbase/cli
        printf "Y\n$TCB_SECRETID\n$TCB_SECRETKEY\n" | tcb login --key
        cd $GITHUB_WORKSPACE/cloud-functions/analyzeStock
        tcb fn deploy analyzeStock -e $TCB_ENV_ID
        cd $GITHUB_WORKSPACE
        tcb hosting deploy H5页面/index.html -e $TCB_ENV_ID
        echo "🎉 部署完成！"
